<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FenrisHub{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0f0f0f;
            color: #d8d8d8;
            font-family: Consolas, 'Liberation Mono', Menlo, monospace;
            line-height: 1.5;
            min-height: 100vh;
            padding: 16px;
        }

        .container {
            max-width: 980px;
            margin: 0 auto;
        }

        .header {
            background-color: #131313;
            border: 1px solid #2a2a2a;
            padding: 14px;
            margin-bottom: 14px;
        }

        .header h1 {
            font-size: 20px;
            color: #9fcf82;
            margin-bottom: 2px;
            font-weight: 600;
        }

        .header p {
            font-size: 12px;
            color: #8c8c8c;
        }

        .nav {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #2a2a2a;
        }

        .nav a {
            color: #9fcf82;
            text-decoration: none;
            font-size: 12px;
            padding: 6px 10px;
            border: 1px solid #2f2f2f;
            background-color: #111111;
        }

        .nav a:hover {
            text-decoration: underline;
        }

        .content {
            background-color: #131313;
            border: 1px solid #2a2a2a;
            padding: 14px;
        }

        .info-box {
            padding: 10px;
            margin-bottom: 12px;
            background-color: #111111;
            border: 1px solid #2f2f2f;
            font-size: 12px;
            color: #b9b9b9;
        }

        .warning-box {
            padding: 10px;
            margin-bottom: 12px;
            background-color: #1a1510;
            border: 1px solid #5a4428;
            color: #d4b17f;
            font-size: 12px;
        }

        .error-box {
            padding: 10px;
            margin-bottom: 12px;
            background-color: #1a1010;
            border: 1px solid #5a2a2a;
            color: #d28e8e;
            font-size: 12px;
        }

        .success-box {
            padding: 10px;
            margin-bottom: 12px;
            background-color: #101810;
            border: 1px solid #2b5a2b;
            color: #8fbf8f;
            font-size: 12px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin-bottom: 4px;
            font-size: 12px;
            color: #b0b0b0;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 8px;
            background-color: #101010;
            color: #d8d8d8;
            border: 1px solid #2f2f2f;
            font-family: inherit;
            font-size: 12px;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="email"]:focus,
        textarea:focus {
            outline: none;
            border-color: #9fcf82;
        }

        textarea {
            resize: vertical;
            min-height: 220px;
        }

        textarea.internal-note {
            min-height: 72px;
        }

        button {
            padding: 8px 12px;
            background-color: #101010;
            color: #9fcf82;
            border: 1px solid #2f2f2f;
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
        }

        button:hover {
            text-decoration: underline;
        }

        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .button-group button {
            min-width: 120px;
        }

        .fixlist-item {
            padding: 10px;
            margin-bottom: 8px;
            background-color: #101010;
            border: 1px solid #2f2f2f;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .fixlist-item:hover {
            border-color: #3b3b3b;
        }

        .fixlist-title {
            font-size: 13px;
            color: #d8d8d8;
        }

        .fixlist-meta {
            font-size: 12px;
            color: #8c8c8c;
            margin-top: 4px;
        }

        .fixlist-actions {
            display: flex;
            gap: 8px;
        }

        .fixlist-actions a,
        .fixlist-actions button {
            padding: 6px 10px;
            font-size: 12px;
            flex-shrink: 0;
        }

        .copy-feedback {
            display: none;
            margin-top: 8px;
            padding: 8px;
            background-color: #101810;
            border: 1px solid #2b5a2b;
            color: #8fbf8f;
            font-size: 12px;
        }

        .copy-feedback.show {
            display: block;
        }

        .divider {
            border-top: 1px solid #2a2a2a;
            margin: 12px 0;
        }

        .code-block {
            background-color: #101010;
            border: 1px solid #2f2f2f;
            padding: 10px;
            margin: 8px 0;
            overflow-x: auto;
            font-size: 12px;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: #c4dcb7;
        }

        h2 {
            font-size: 16px;
            color: #d8d8d8;
            margin-bottom: 10px;
            font-weight: 600;
        }

        h3 {
            font-size: 13px;
            color: #c9c9c9;
            margin-bottom: 8px;
            font-weight: 600;
        }

        a {
            color: #9fcf82;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .muted {
            color: #8c8c8c;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .fixlist-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .fixlist-actions {
                margin-top: 8px;
                width: 100%;
            }

            .nav {
                flex-direction: column;
            }

            .header {
                padding: 10px;
            }

            .content {
                padding: 10px;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>FenrisHub</h1>
            <p>secure fixlist terminal</p>
            {% if user.is_authenticated %}
            <div class="nav">
                <a href="{% url 'dashboard' %}">fixlists</a>
                <a href="{% url 'create_fixlist' %}">create</a>
                <a href="{% url 'log_analyzer' %}">analyze</a>
                <form method="post" action="{% url 'logout' %}" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit">Logout {{ user.username }}</button>
                </form>
            </div>
            {% else %}
            <div class="nav">
                <a href="{% url 'login' %}">Login</a>
            </div>
            {% endif %}
        </div>

        <div class="content">
            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
