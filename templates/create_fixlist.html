{% extends 'base.html' %}

{% block title %}Create Fixlist - FenrisHub{% endblock %}

{% block header_context %}
<div class="page-context">create fixlist / {{ user.username }}</div>
{% endblock %}

{% block content %}
<div>
    <form method="post" id="createFixlistForm">
        {% csrf_token %}
        <input type="hidden" id="persistRulesInput" name="persist_rules" value="0">
        <input type="hidden" id="pendingRuleChangesInput" name="pending_rule_changes_json" value="[]">
        <input type="hidden" id="selectedRuleIdsInput" name="selected_rule_change_ids_json" value="[]">

        <div class="form-group">
            <label for="title">title</label>
            <input type="text" id="title" name="title" placeholder="Enter fixlist title..." required>
        </div>

        <div class="form-group">
            <label for="content">content</label>
            <textarea id="content" name="content" placeholder="Paste or type your fixlist content here..." required></textarea>
        </div>

        <div class="form-group">
            <label for="internal_note">internal note</label>
            <textarea id="internal_note" name="internal_note" class="internal-note" rows="3" placeholder="Only visible to logged in users."></textarea>
        </div>

        <div class="button-group">
            <button type="submit">create</button>
            <a href="{% url 'dashboard' %}"><button type="button">back to list</button></a>
        </div>
    </form>
</div>

<style>
</style>

<script>
const PREFILL_CONTENT_KEY = 'fenrishub_prefill_content';
const PENDING_STATUS_STORAGE_KEY = 'fenrishub_pending_status_changes';

function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) {
        return parts.pop().split(';').shift();
    }
    return '';
}

function safeParseJson(input, fallback) {
    try {
        return JSON.parse(input);
    } catch (error) {
        return fallback;
    }
}

document.addEventListener('DOMContentLoaded', function() {
    const prefillContent = sessionStorage.getItem(PREFILL_CONTENT_KEY);
    const persistRules = sessionStorage.getItem('fenrishub_persist_rules');
    const pendingRuleChanges = sessionStorage.getItem('fenrishub_pending_rule_changes');
    const selectedRuleIds = sessionStorage.getItem('fenrishub_selected_rule_ids');
    
    const contentField = document.getElementById('content');
    const form = document.getElementById('createFixlistForm');
    const persistInput = document.getElementById('persistRulesInput');
    const pendingInput = document.getElementById('pendingRuleChangesInput');
    const selectedInput = document.getElementById('selectedRuleIdsInput');

    if (prefillContent && contentField && !contentField.value.trim()) {
        contentField.value = prefillContent;
    }

    if (persistRules && persistInput) {
        persistInput.value = persistRules;
    }
    
    if (pendingRuleChanges && pendingInput) {
        pendingInput.value = pendingRuleChanges;
    }
    
    if (selectedRuleIds && selectedInput) {
        selectedInput.value = selectedRuleIds;
    }

    // Clear prefill from sessionStorage
    sessionStorage.removeItem(PREFILL_CONTENT_KEY);
    sessionStorage.removeItem('fenrishub_persist_rules');
    sessionStorage.removeItem('fenrishub_pending_rule_changes');
    sessionStorage.removeItem('fenrishub_selected_rule_ids');
});
</script>
{% endblock %}
