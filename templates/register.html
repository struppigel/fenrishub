{% extends 'base.html' %}

{% block title %}Register - FenrisHub{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 0 auto; padding: 40px 0;">
    <h2 style="margin-bottom: 30px; text-align: center;">$ REGISTER</h2>

    {% if error %}
    <div class="error-box">
        ⚠️ {{ error }}
    </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required autofocus>
        </div>

        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
        </div>

        <div class="form-group">
            <label for="password_confirm">Confirm Password:</label>
            <input type="password" id="password_confirm" name="password_confirm" required>
        </div>

        <div class="button-group">
            <button type="submit">$ CREATE_ACCOUNT</button>
        </div>
    </form>

    <div class="divider"></div>

    <p style="text-align: center; margin-top: 20px;">
        Already have an account? <a href="{% url 'login' %}" style="text-decoration: underline;">Login here</a>
    </p>
</div>
{% endblock %}
